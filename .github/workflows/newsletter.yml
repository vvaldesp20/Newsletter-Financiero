name: Financial Daily Newsletter

on:
  workflow_dispatch:  # Triggered by cron-job.org at 08:30 America/Santiago (Mon–Fri)

permissions:
  contents: write   # necesario para publicar en gh-pages

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Crear archivo .env desde Secrets
        run: |
          echo "FINVIZ_EMAIL=${{ secrets.FINVIZ_EMAIL }}" >> .env
          echo "FINVIZ_PASSWORD=${{ secrets.FINVIZ_PASSWORD }}" >> .env
          echo "EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}" >> .env
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> .env
          echo "EMAIL_RECIPIENTS=${{ secrets.EMAIL_RECIPIENTS }}" >> .env
          echo "EMAIL_SMTP_HOST=smtp.gmail.com" >> .env
          echo "EMAIL_SMTP_PORT=587" >> .env
          echo "NEWSLETTER_TIME=08:30" >> .env

      - name: Ejecutar newsletter
        run: python main.py

      - name: Preparar archivos para GitHub Pages
        run: |
          mkdir -p pages_out
          cp output_latest.html pages_out/index.html
          cp output_latest.html pages_out/$(date +%Y-%m-%d).html

      - name: Publicar newsletter en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages_out
          keep_files: true            # mantiene historial de fechas anteriores
          commit_message: "Newsletter ${{ github.run_id }} — $(date +%Y-%m-%d)"

      - name: Guardar HTML como artefacto (7 dias)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ github.run_id }}
          path: output_latest.html
          retention-days: 7

      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_SENDER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Error en Financial Daily Newsletter - ${{ github.run_id }}"
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: Financial Daily <${{ secrets.EMAIL_SENDER }}>
          body: |
            El newsletter falló en la ejecución ${{ github.run_id }}.
            Revisa los logs en: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
